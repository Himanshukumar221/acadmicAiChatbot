<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Advisor Bot</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#06142e,#0f3460,#1b3c73);
min-height:100vh;
overflow-x:hidden;
color:white;
}

/* Navbar */

nav{

display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
backdrop-filter:blur(20px);
background:rgba(255,255,255,.05);
border-bottom:1px solid rgba(255,255,255,.1);

position:sticky;
top:0;
z-index:100;
}

.logo{

font-size:28px;
font-weight:700;
letter-spacing:1px;
}

.logo span{

color:#4da3ff;
}

nav ul{

display:flex;
list-style:none;
gap:40px;
}

nav ul li a{

text-decoration:none;
color:white;
font-size:16px;
transition:.4s;
}

nav ul li a:hover{

color:#4da3ff;
}

/* Hero Section */

.hero{

display:flex;
justify-content:space-between;
align-items:center;
padding:80px 8%;
min-height:90vh;
}

.left{

width:50%;
}

.left h1{

font-size:60px;
line-height:80px;
margin-bottom:25px;
}

.left span{

background:linear-gradient(to right,#4da3ff,#87ceff);

-webkit-background-clip:text;
color:transparent;
}

.left p{

font-size:18px;
line-height:35px;
opacity:.8;
margin-bottom:40px;
}

.buttons{

display:flex;
gap:20px;
}

.btn{

padding:16px 35px;
border-radius:50px;
border:none;
font-size:16px;
cursor:pointer;
transition:.5s;
font-weight:600;
}

.chat{

background:#4da3ff;
color:white;
box-shadow:0 0 20px #4da3ff;
}

.course{

background:transparent;
border:2px solid white;
color:white;
}

.btn:hover{

transform:translateY(-8px);
}

/* Right Image */

.right{

width:40%;
display:flex;
justify-content:center;
}

.circle{

width:420px;
height:420px;

background:rgba(255,255,255,.08);

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.2);

box-shadow:

0 0 30px rgba(0,0,0,.4),
0 0 80px rgba(77,163,255,.3);
}

.circle img{

width:280px;
}

/* Features */

.features{

padding:100px 8%;
text-align:center;
}

.features h2{

font-size:40px;
margin-bottom:60px;
}

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:30px;
}

.card{

background:rgba(255,255,255,.08);

padding:35px;

border-radius:25px;

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.1);

transition:.5s;

box-shadow:
0 10px 30px rgba(0,0,0,.3);

}

.card:hover{

transform:translateY(-15px);

background:rgba(77,163,255,.15);
}

.icon{

font-size:45px;
margin-bottom:20px;
}

.card h3{

margin-bottom:15px;
}

.card p{

font-size:14px;
opacity:.8;
line-height:28px;
}

/* Footer */

footer{

margin-top:50px;
padding:25px;
text-align:center;
background:rgba(255,255,255,.05);

border-top:1px solid rgba(255,255,255,.1);

}

/* Responsive */

@media(max-width:900px){

.hero{

flex-direction:column;
text-align:center;
}

.left{

width:100%;
}

.right{

width:100%;
margin-top:50px;
}

.left h1{

font-size:42px;
line-height:60px;
}

.buttons{

justify-content:center;
}

.circle{

width:300px;
height:300px;
}

.circle img{

width:220px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">

🎓 Academic<span>Bot</span>

</div>

<ul>

<li><a href="index.html">Home</a></li>
<li><a href="feature.html">Features</a></li>
<li><a href="about.html">About</a></li>
<li><a href="register.html">Register</a></li>
<li><a href="login.html">Login</a></li>

</ul>

</nav>


<section class="hero">

<div class="left">

<h1>

Your AI Powered <br>

<span>Academic Advisor</span>

</h1>

<p>

Get instant academic support, personalized course suggestions, semester planning and appointment scheduling with smart AI assistance.

</p>

<div class="buttons">

<button class="btn chat" onclick="window.location.href='chatbot.html'">
Start Chat
</button>

<button class="btn course" onclick="window.location.href='courses.html'">
View Courses
</button>

</div>

</div>

<div class="right">

<div class="circle">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

</div>

</div>

</section>




<footer>

© 2026 Academic Advisor Bot | All Rights Reserved

</footer>

</body>
</html>
