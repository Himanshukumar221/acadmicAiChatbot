<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background:
linear-gradient(
135deg,
#06142e,
#0f3460,
#1b3c73
);

overflow:hidden;
}

/* Background circles */

body::before{

content:"";

position:absolute;

width:300px;
height:300px;

background:#4da3ff;

border-radius:50%;

top:-100px;
left:-100px;

filter:blur(100px);

opacity:.5;
}

body::after{

content:"";

position:absolute;

width:300px;
height:300px;

background:#00d4ff;

border-radius:50%;

bottom:-100px;
right:-100px;

filter:blur(100px);

opacity:.5;
}


/* Main Container */

.container{

position:relative;

width:430px;

padding:40px;

border-radius:30px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border:
1px solid rgba(255,255,255,.1);

box-shadow:

0 10px 40px rgba(0,0,0,.4);

color:white;
}

/* heading */

.container h1{

text-align:center;

margin-bottom:30px;

font-size:35px;
}


/* Input field */

.input-box{

margin-bottom:20px;
}

.input-box input,
.input-box select{

width:100%;

padding:15px 20px;

border:none;
outline:none;

border-radius:50px;

background:
rgba(255,255,255,.1);

color:white;

font-size:15px;

border:
1px solid rgba(255,255,255,.1);

transition:.5s;
}

.input-box input:focus,
.input-box select:focus{

border:1px solid #4da3ff;

box-shadow:
0 0 15px #4da3ff;
}

input::placeholder{

color:#ddd;
}

select option{

background:#0f3460;
color:white;
}


/* Button */

button{

width:100%;

padding:15px;

border:none;

border-radius:50px;

cursor:pointer;

font-size:16px;

font-weight:600;

background:
linear-gradient(
45deg,
#4da3ff,
#00d4ff
);

color:white;

transition:.5s;

box-shadow:
0 0 25px rgba(77,163,255,.5);

}

button:hover{

transform:
translateY(-5px);

box-shadow:
0 0 40px rgba(77,163,255,.8);

}


/* Login link */

.login{

text-align:center;

margin-top:20px;

font-size:14px;
}

.login a{

color:#4da3ff;

text-decoration:none;

font-weight:bold;
}

.login a:hover{

text-decoration:underline;
}


/* Mobile */

@media(max-width:500px){

.container{

width:95%;
padding:30px;
}

.container h1{

font-size:28px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Student Registration</h1>

<form action="RegisterServlet" method="post">

<div class="input-box">

<input type="text"
name="name"
placeholder="Enter Full Name"
required>

</div>


<div class="input-box">

<input type="email"
name="email"
placeholder="Enter Email"
required>

</div>


<div class="input-box">

<select name="department" required>

<option value="">
Select Department
</option>

<option>
Computer Science Engineering
</option>

<option>
Information Technology
</option>

<option>
Mechanical Engineering
</option>

<option>
Civil Engineering
</option>

<option>
Electrical Engineering
</option>

<option>
Electronics Engineering
</option>

<option>
Artificial Intelligence
</option>

<option>
Data Science
</option>

<option>
BCA
</option>

<option>
MCA
</option>

</select>

</div>


<div class="input-box">

<input type="password"
name="password"
placeholder="Enter Password"
required>

</div>


<div class="input-box">

<input type="password"
name="confirmPassword"
placeholder="Confirm Password"
required>

</div>


<button type="submit">

Register

</button>

<div class="login">

Already have account?

<a href="login.html">

Login

</a>

</div>

</form>

</div>

</body>
</html>
