<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Book Appointment</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background:
linear-gradient(
135deg,
#06142e,
#0f3460,
#1b3c73
);

padding:30px;
color:white;
}

.container{

width:700px;

padding:40px;

border-radius:30px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border:
1px solid rgba(255,255,255,.1);

box-shadow:
0 10px 40px rgba(0,0,0,.4);

}

.container h1{

text-align:center;
margin-bottom:30px;
font-size:35px;
}

.form-group{

margin-bottom:20px;
}

label{

display:block;
margin-bottom:8px;
font-weight:500;
}

input,
select,
textarea{

width:100%;

padding:15px;

border:none;
outline:none;

border-radius:15px;

background:
rgba(255,255,255,.1);

color:white;

border:
1px solid rgba(255,255,255,.1);

font-size:15px;

}

input::placeholder,
textarea::placeholder{

color:#ddd;
}

select option{

background:#0f3460;
}

textarea{

height:120px;
resize:none;
}

.row{

display:grid;

grid-template-columns:
1fr 1fr;

gap:20px;
}

.btn{

width:100%;

padding:16px;

border:none;

border-radius:50px;

cursor:pointer;

font-size:16px;
font-weight:600;

background:
linear-gradient(
45deg,
#4da3ff,
#00d4ff
);

color:white;

transition:.5s;

margin-top:15px;
}

.btn:hover{

transform:
translateY(-5px);

box-shadow:
0 0 30px #4da3ff;
}

@media(max-width:700px){

.row{

grid-template-columns:1fr;
}

.container{

width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<h1>

📅 Book Appointment

</h1>

<form action="AppointmentServlet"
method="post">

<div class="row">

<div class="form-group">

<label>

Student Name

</label>

<input
type="text"
name="name"
placeholder="Enter Name"
required>

</div>


<div class="form-group">

<label>

Email

</label>

<input
type="email"
name="email"
placeholder="Enter Email"
required>

</div>

</div>



<div class="row">

<div class="form-group">

<label>

Department

</label>

<select
name="department"
required>

<option>

Select Department

</option>

<option>

Computer Science

</option>

<option>

Information Technology

</option>

<option>

AI & Data Science

</option>

<option>

Mechanical

</option>

</select>

</div>



<div class="form-group">

<label>

Academic Advisor

</label>

<select
name="advisor"
required>

<option>

Select Advisor

</option>

<option>

Dr. Sharma

</option>

<option>

Dr. Singh

</option>

<option>

Prof. Kumar

</option>

</select>

</div>

</div>



<div class="row">

<div class="form-group">

<label>

Date

</label>

<input
type="date"
name="date"
required>

</div>


<div class="form-group">

<label>

Time Slot

</label>

<select
name="time"
required>

<option>

Select Time

</option>

<option>

10:00 AM

</option>

<option>

11:00 AM

</option>

<option>

2:00 PM

</option>

<option>

4:00 PM

</option>

</select>

</div>

</div>



<div class="form-group">

<label>

Reason

</label>

<textarea
name="reason"
placeholder="Enter reason for appointment..."
required>

</textarea>

</div>


<button
class="btn">

Book Appointment

</button>

</form>

</div>

</body>

</html>
